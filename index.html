<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WildGuns — Attack Timer</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0e0c0a;--surf:#1a1714;--surf2:#242018;--border:#38332b;
  --gold:#c9922a;--gold-l:#e8b84b;--gold-d:#7a5618;
  --red:#e74c3c;--green:#27ae60;
  --text:#e8e0d0;--dim:#8a7f6e;--muted:#5a5244;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;
  background-image:radial-gradient(ellipse 80% 40% at 50% 0%,#2a1f0a18 0%,transparent 70%),
  repeating-linear-gradient(0deg,transparent,transparent 39px,#38332b10 39px,#38332b10 40px),
  repeating-linear-gradient(90deg,transparent,transparent 39px,#38332b10 39px,#38332b10 40px);}

/* HEADER */
header{border-bottom:1px solid var(--border);padding:0.9rem 1.25rem;display:flex;align-items:center;gap:0.75rem;background:#12100d;position:sticky;top:0;z-index:50;}
.h-icon{font-size:22px;color:var(--gold);}
.h-title{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:0.08em;color:var(--gold-l);line-height:1;}
.h-sub{font-size:10px;color:var(--muted);font-family:'IBM Plex Mono',monospace;letter-spacing:0.1em;text-transform:uppercase;margin-top:2px;}

/* TABS BAR */
.tabs-bar{background:#12100d;border-bottom:1px solid var(--border);display:flex;align-items:stretch;overflow-x:auto;padding:0 0.75rem;gap:2px;}
.tabs-bar::-webkit-scrollbar{height:3px;}
.tabs-bar::-webkit-scrollbar-thumb{background:var(--border);}
.tab{font-family:'IBM Plex Mono',monospace;font-size:12px;padding:0.55rem 0.9rem;border:none;background:transparent;color:var(--dim);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all 0.15s;display:flex;align-items:center;gap:6px;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--gold-l);border-bottom-color:var(--gold);}
.tab .tcl{font-size:14px;color:var(--muted);line-height:1;margin-left:2px;opacity:0.6;}
.tab .tcl:hover{color:var(--red);opacity:1;}
.tab-add{font-size:18px;padding:0.45rem 0.7rem;color:var(--dim);}
.tab-add:hover{color:var(--gold-l);}

/* MAIN */
.container{max-width:560px;margin:0 auto;padding:1.25rem 1rem 4rem;}
.attack-panel{display:none;}.attack-panel.active{display:block;}

/* SECTION */
.sl{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:0.45rem;display:flex;align-items:center;gap:8px;}
.sl::after{content:'';flex:1;height:1px;background:var(--border);}
.card{background:var(--surf);border:1px solid var(--border);border-radius:6px;padding:0.9rem 1.1rem;margin-bottom:0.9rem;}

/* VILLAGE ROW */
.vrow{display:flex;gap:6px;align-items:stretch;}
.vrow select,.fav-row select{flex:1;background:var(--surf2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:13px;padding:7px 8px;cursor:pointer;}
.vrow select:focus,.fav-row select:focus{outline:none;border-color:var(--gold-d);}
.ib{background:var(--surf2);border:1px solid var(--border);border-radius:4px;color:var(--dim);font-size:15px;width:34px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;}
.ib:hover{border-color:var(--gold-d);color:var(--gold-l);}
.ib.danger:hover{border-color:#c0392b;color:var(--red);}
.vcoords{margin-top:6px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);}
.vcoords span{color:var(--gold);}

/* TROOPS */
.troops-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px;}
.troop-chip{display:flex;align-items:center;gap:7px;background:var(--surf2);border:1px solid var(--border);border-radius:4px;padding:6px 9px;cursor:pointer;transition:all 0.15s;user-select:none;}
.troop-chip:hover{border-color:var(--gold-d);}
.troop-chip.selected{background:#2a1f0a;border-color:var(--gold-d);}
.troop-chip input[type=checkbox]{accent-color:var(--gold);width:14px;height:14px;flex-shrink:0;}
.troop-name{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--dim);flex:1;}
.troop-chip.selected .troop-name{color:var(--gold-l);}
.troop-spd{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);}
.troop-chip.selected .troop-spd{color:var(--gold-d);}
.troop-hint{margin-top:7px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);}
.troop-hint span{color:var(--gold);}

/* COORDS */
.coord-row{display:grid;grid-template-columns:1fr 18px 1fr;gap:6px;align-items:center;}
.csep{text-align:center;font-family:'IBM Plex Mono',monospace;font-size:16px;color:var(--muted);padding-top:16px;}
.field{display:flex;flex-direction:column;gap:3px;}
.field label{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--dim);letter-spacing:0.04em;}
.field input[type=number]{background:var(--surf2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:17px;padding:6px 8px;width:100%;text-align:center;-moz-appearance:textfield;}
.field input::-webkit-outer-spin-button,.field input::-webkit-inner-spin-button{-webkit-appearance:none;}
.field input:focus{outline:none;border-color:var(--gold-d);background:#1f1c16;}

/* FAV ROW */
.fav-row{display:flex;gap:6px;align-items:center;margin-top:8px;}
.fav-row select{font-size:12px;padding:5px 8px;}
.fav-label{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);white-space:nowrap;}
.fav-save-btn{background:var(--surf2);border:1px solid var(--border);border-radius:4px;color:var(--dim);font-family:'IBM Plex Mono',monospace;font-size:11px;padding:5px 10px;cursor:pointer;white-space:nowrap;}
.fav-save-btn:hover{border-color:var(--gold-d);color:var(--gold-l);}

/* TIME */
.time-grid{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:7px;align-items:end;}
.now-btn{background:var(--surf2);border:1px solid var(--border);border-radius:4px;color:var(--dim);font-family:'IBM Plex Mono',monospace;font-size:11px;padding:6px 9px;cursor:pointer;white-space:nowrap;height:36px;transition:all 0.15s;}
.now-btn:hover{border-color:var(--gold-d);color:var(--gold-l);}

/* CALC BTN */
.calc-btn{width:100%;background:var(--gold);border:none;border-radius:6px;color:#0e0c0a;font-family:'Bebas Neue',cursive;font-size:19px;letter-spacing:0.1em;padding:12px;cursor:pointer;margin:0.2rem 0 0.9rem;transition:background 0.15s,transform 0.1s;}
.calc-btn:hover{background:var(--gold-l);}
.calc-btn:active{transform:scale(0.99);}

/* ALERT */
.alert{display:none;background:#2a1208;border:1px solid #7a2c1a;border-radius:4px;padding:0.55rem 0.75rem;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#e8a090;margin-bottom:0.75rem;}
.alert.show{display:block;}

/* RESULT */
.rp{display:none;background:var(--surf);border:1px solid var(--gold-d);border-radius:6px;overflow:hidden;}
.rp.show{display:block;}
.rtop{background:#1f1a10;border-bottom:1px solid var(--border);padding:1.1rem;text-align:center;}
.cdlbl{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.cdval{font-family:'Bebas Neue',cursive;font-size:50px;letter-spacing:0.05em;color:var(--gold-l);line-height:1;font-variant-numeric:tabular-nums;transition:color 0.3s;}
.cdval.urgent{color:var(--red);}
.cdval.now{color:var(--red);animation:pulse 0.5s infinite alternate;}
@keyframes pulse{from{opacity:1;}to{opacity:0.35;}}
.srow{margin-top:7px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--dim);}
.srow strong{color:var(--gold-l);font-size:15px;font-weight:500;}
.rbody{padding:0.9rem 1.1rem;}
.rgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.ri{background:var(--surf2);border:1px solid var(--border);border-radius:4px;padding:0.55rem 0.7rem;}
.rl{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:2px;}
.rv{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--text);}

/* MODAL */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.78);z-index:200;align-items:center;justify-content:center;padding:1rem;}
.mo.show{display:flex;}
.md{background:var(--surf);border:1px solid var(--gold-d);border-radius:8px;padding:1.4rem;width:340px;max-width:100%;}
.md h2{font-family:'Bebas Neue',cursive;font-size:21px;color:var(--gold-l);letter-spacing:0.08em;margin-bottom:1rem;}
.mf{margin-bottom:0.7rem;}
.mf label{display:block;font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--dim);letter-spacing:0.04em;margin-bottom:3px;}
.mf input{width:100%;background:var(--surf2);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:15px;padding:7px 10px;-moz-appearance:textfield;}
.mf input::-webkit-outer-spin-button,.mf input::-webkit-inner-spin-button{-webkit-appearance:none;}
.mf input:focus{outline:none;border-color:var(--gold-d);}
.mcrow{display:grid;grid-template-columns:1fr 14px 1fr;gap:5px;align-items:center;}
.mcsep{text-align:center;font-family:'IBM Plex Mono',monospace;font-size:15px;color:var(--muted);}
.merr{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--red);margin-bottom:0.4rem;display:none;}
.merr.show{display:block;}
.mbtns{display:flex;gap:7px;margin-top:0.9rem;}
.msave{flex:1;background:var(--gold);border:none;border-radius:4px;color:#0e0c0a;font-family:'Bebas Neue',cursive;font-size:17px;letter-spacing:0.08em;padding:8px;cursor:pointer;}
.msave:hover{background:var(--gold-l);}
.mcancel{background:none;border:1px solid var(--border);border-radius:4px;color:var(--dim);font-family:'IBM Plex Mono',monospace;font-size:12px;padding:8px 12px;cursor:pointer;}
</style>
</head>
<body>
<header>
  <div class="h-icon">&#10022;</div>
  <div>
    <div class="h-title">WildGuns Attack Timer</div>
    <div class="h-sub">Calculador de tempo de envio</div>
  </div>
</header>

<div class="tabs-bar" id="tabs-bar">
  <!-- tabs rendered by JS -->
  <button class="tab tab-add" id="tab-add-btn" onclick="addTab()" title="Novo ataque">+</button>
</div>

<div class="container" id="panels-container">
  <!-- panels rendered by JS -->
</div>

<!-- Village Modal -->
<div class="mo" id="vmodal">
  <div class="md">
    <h2 id="vm-title">Nova Vila</h2>
    <div class="mf"><label>Nome da vila</label><input type="text" id="vm-name" placeholder="ex: Vila Principal" maxlength="24"></div>
    <div class="mf">
      <label>Coordenadas</label>
      <div class="mcrow">
        <input type="number" id="vm-x" placeholder="X" style="text-align:center;">
        <div class="mcsep">|</div>
        <input type="number" id="vm-y" placeholder="Y" style="text-align:center;">
      </div>
    </div>
    <div class="merr" id="vm-err">Preenche todos os campos.</div>
    <div class="mbtns">
      <button class="mcancel" onclick="closeVModal()">cancelar</button>
      <button class="msave" onclick="saveVillage()">Guardar</button>
    </div>
  </div>
</div>

<!-- Fav Target Modal -->
<div class="mo" id="fmodal">
  <div class="md">
    <h2 id="fm-title">Guardar Alvo</h2>
    <div class="mf"><label>Nome do alvo</label><input type="text" id="fm-name" placeholder="ex: Castelo Inimigo" maxlength="24"></div>
    <div class="mf">
      <label>Coordenadas</label>
      <div class="mcrow">
        <input type="number" id="fm-x" placeholder="X" style="text-align:center;">
        <div class="mcsep">|</div>
        <input type="number" id="fm-y" placeholder="Y" style="text-align:center;">
      </div>
    </div>
    <div class="merr" id="fm-err">Preenche todos os campos.</div>
    <div class="mbtns">
      <button class="mcancel" onclick="closeFModal()">cancelar</button>
      <button class="msave" onclick="saveFav()">Guardar</button>
    </div>
  </div>
</div>

<script>
// ── TROOP DATA ──
const TROOPS = [
  {id:'poncho',     name:'Poncho',            spd:6},
  {id:'mariachi',   name:'Mariachi',           spd:7},
  {id:'caballeria', name:'Cabaleria',          spd:14},
  {id:'conquistador',name:'Conquistador',      spd:14},
  {id:'bombolero',  name:'Bombolero',          spd:4},
  {id:'canhao',     name:'Canh\u00e3o',        spd:3},
  {id:'carroca',    name:'Carro\u00e7a de Tequila', spd:4},
];
// speed in tiles/hour → seconds per tile = 3600/spd
function secsPerTile(spd){ return 3600/spd; }

// ── STORAGE ──
const VK='wg_villages', FK='wg_favs';
function getVillages(){ try{return JSON.parse(localStorage.getItem(VK))||[];}catch{return[];} }
function setVillages(v){ localStorage.setItem(VK,JSON.stringify(v)); }
function getFavs(){ try{return JSON.parse(localStorage.getItem(FK))||[];}catch{return[];} }
function setFavs(f){ localStorage.setItem(FK,JSON.stringify(f)); }

// ── TABS STATE ──
var tabs=[]; // [{id, label, troops:Set, countdown_interval}]
var activeTab=null;
var tabCounter=0;

function pad(n){return String(Math.floor(Math.abs(n))).padStart(2,'0');}
function fmtTime(d){return pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds());}
function fmtDur(s){
  var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=Math.floor(s%60);
  return h>0?h+'h '+pad(m)+'m '+pad(ss)+'s':pad(m)+'m '+pad(ss)+'s';
}

// ── RENDER TABS ──
function renderTabsBar(){
  var bar=document.getElementById('tabs-bar');
  bar.querySelectorAll('.tab:not(.tab-add)').forEach(function(b){b.remove();});
  var addBtn=document.getElementById('tab-add-btn');
  tabs.forEach(function(t){
    var btn=document.createElement('button');
    btn.className='tab'+(t.id===activeTab?' active':'');
    btn.dataset.tid=t.id;
    btn.innerHTML=t.label+' <span class="tcl" data-tid="'+t.id+'" onclick="removeTab(\''+t.id+'\',event)">&#10005;</span>';
    btn.addEventListener('click',function(e){
      if(e.target.classList.contains('tcl'))return;
      switchTab(t.id);
    });
    bar.insertBefore(btn,addBtn);
  });
}

function switchTab(id){
  activeTab=id;
  document.querySelectorAll('.attack-panel').forEach(function(p){p.className='attack-panel';});
  var panel=document.getElementById('panel-'+id);
  if(panel) panel.className='attack-panel active';
  renderTabsBar();
}

function addTab(){
  tabCounter++;
  var id='t'+tabCounter;
  var label='Ataque '+tabCounter;
  tabs.push({id:id,label:label,cdInt:null});
  renderTabPanel(id,label);
  switchTab(id);
}

function removeTab(id,e){
  if(e){e.stopPropagation();e.preventDefault();}
  var t=tabs.find(function(x){return x.id===id;});
  if(t&&t.cdInt) clearInterval(t.cdInt);
  tabs=tabs.filter(function(x){return x.id!==id;});
  var panel=document.getElementById('panel-'+id);
  if(panel) panel.remove();
  if(tabs.length===0){addTab();return;}
  if(activeTab===id) switchTab(tabs[tabs.length-1].id);
  else renderTabsBar();
}

function renderTabPanel(id,label){
  var c=document.getElementById('panels-container');
  var div=document.createElement('div');
  div.className='attack-panel';
  div.id='panel-'+id;
  div.innerHTML=panelHTML(id,label);
  c.appendChild(div);
  renderVillageSelect(id);
  renderFavSelect(id);
  renderTroopChips(id);
}

function panelHTML(id){
  return '<div class="sl">Vila de origem</div>'+
  '<div class="card">'+
    '<div class="vrow">'+
      '<select id="vs-'+id+'" onchange="onVillageChange(\''+id+'\')"><option value="">&#8212; escolhe uma vila &#8212;</option></select>'+
      '<button class="ib" title="Adicionar vila" onclick="openVModal(\'add\',\''+id+'\')">+</button>'+
      '<button class="ib" id="veb-'+id+'" title="Editar" onclick="openVModal(\'edit\',\''+id+'\')">&#9998;</button>'+
      '<button class="ib danger" id="vdb-'+id+'" title="Apagar" onclick="deleteVillage(\''+id+'\')">&#10005;</button>'+
    '</div>'+
    '<div class="vcoords" id="vc-'+id+'">Adiciona uma vila com o bot&#227;o +</div>'+
  '</div>'+

  '<div class="sl">Tropas a enviar</div>'+
  '<div class="card">'+
    '<div class="troops-grid" id="tg-'+id+'"></div>'+
    '<div class="troop-hint" id="th-'+id+'">Seleciona pelo menos uma tropa</div>'+
  '</div>'+

  '<div class="sl">Alvo</div>'+
  '<div class="card">'+
    '<div class="coord-row">'+
      '<div class="field"><label>X (alvo)</label><input type="number" id="tx-'+id+'" placeholder="201"></div>'+
      '<div class="csep">|</div>'+
      '<div class="field"><label>Y (alvo)</label><input type="number" id="ty-'+id+'" placeholder="194"></div>'+
    '</div>'+
    '<div class="fav-row">'+
      '<span class="fav-label">Favoritos:</span>'+
      '<select id="fs-'+id+'" onchange="loadFav(\''+id+'\')"><option value="">&#8212;</option></select>'+
      '<button class="ib" title="Apagar favorito" id="fdb-'+id+'" onclick="deleteFav(\''+id+'\')">&#10005;</button>'+
      '<button class="fav-save-btn" onclick="openFModal(\''+id+'\')">+ guardar</button>'+
    '</div>'+
  '</div>'+

  '<div class="sl">Hora de chegada desejada</div>'+
  '<div class="card">'+
    '<div class="time-grid">'+
      '<div class="field"><label>Horas</label><input type="number" id="ah-'+id+'" placeholder="14" min="0" max="23"></div>'+
      '<div class="field"><label>Minutos</label><input type="number" id="am-'+id+'" placeholder="30" min="0" max="59"></div>'+
      '<div class="field"><label>Segundos</label><input type="number" id="as-'+id+'" placeholder="00" min="0" max="59"></div>'+
      '<button class="now-btn" onclick="setNow(\''+id+'\')">agora</button>'+
    '</div>'+
  '</div>'+

  '<button class="calc-btn" onclick="calculate(\''+id+'\')">Calcular hora de envio</button>'+
  '<div class="alert" id="al-'+id+'"></div>'+

  '<div class="rp" id="rp-'+id+'">'+
    '<div class="rtop">'+
      '<div class="cdlbl">envia em</div>'+
      '<div class="cdval" id="cd-'+id+'">--:--:--</div>'+
      '<div class="srow">envia &#224;s <strong id="st-'+id+'">--:--:--</strong><span id="sd-'+id+'"></span></div>'+
    '</div>'+
    '<div class="rbody">'+
      '<div class="rgrid">'+
        '<div class="ri"><div class="rl">Dist&#226;ncia</div><div class="rv" id="rd-'+id+'">&#8212;</div></div>'+
        '<div class="ri"><div class="rl">Tempo de viagem</div><div class="rv" id="rt-'+id+'">&#8212;</div></div>'+
        '<div class="ri"><div class="rl">Vila</div><div class="rv" id="ro-'+id+'">&#8212;</div></div>'+
        '<div class="ri"><div class="rl">Tropa mais lenta</div><div class="rv" id="rtr-'+id+'">&#8212;</div></div>'+
      '</div>'+
    '</div>'+
  '</div>';
}

// ── VILLAGE SELECT ──
function renderVillageSelect(id,keep){
  var v=getVillages(),sel=document.getElementById('vs-'+id);
  if(!sel)return;
  sel.innerHTML='<option value="">&#8212; escolhe uma vila &#8212;</option>';
  v.forEach(function(x,i){var o=document.createElement('option');o.value=i;o.textContent=x.name+' ('+x.x+'|'+x.y+')';sel.appendChild(o);});
  if(keep!==undefined&&v[keep])sel.value=keep;
  onVillageChange(id);
}
function onVillageChange(id){
  var v=getVillages(),idx=parseInt(document.getElementById('vs-'+id).value),has=!isNaN(idx)&&!!v[idx];
  document.getElementById('veb-'+id).style.opacity=has?'1':'0.3';
  document.getElementById('vdb-'+id).style.opacity=has?'1':'0.3';
  document.getElementById('vc-'+id).innerHTML=has?'Coordenadas: <span>'+v[idx].x+' | '+v[idx].y+'</span>':(getVillages().length?'Seleciona uma vila':'Adiciona uma vila com o bot&#227;o +');
  resetResult(id);
}

// ── FAV SELECT ──
function renderFavSelect(id,keep){
  var f=getFavs(),sel=document.getElementById('fs-'+id);
  if(!sel)return;
  sel.innerHTML='<option value="">&#8212;</option>';
  f.forEach(function(x,i){var o=document.createElement('option');o.value=i;o.textContent=x.name+' ('+x.x+'|'+x.y+')';sel.appendChild(o);});
  if(keep!==undefined&&f[keep])sel.value=keep;
  var fdb=document.getElementById('fdb-'+id);
  if(fdb)fdb.style.opacity=sel.value!==''?'1':'0.3';
}
function loadFav(id){
  var f=getFavs(),idx=parseInt(document.getElementById('fs-'+id).value);
  var fdb=document.getElementById('fdb-'+id);
  if(fdb)fdb.style.opacity=!isNaN(idx)&&f[idx]?'1':'0.3';
  if(isNaN(idx)||!f[idx])return;
  document.getElementById('tx-'+id).value=f[idx].x;
  document.getElementById('ty-'+id).value=f[idx].y;
  resetResult(id);
}
function deleteFav(id){
  var f=getFavs(),idx=parseInt(document.getElementById('fs-'+id).value);
  if(isNaN(idx)||!f[idx])return;
  if(!confirm('Apagar "'+f[idx].name+'"?'))return;
  f.splice(idx,1);setFavs(f);
  tabs.forEach(function(t){renderFavSelect(t.id);});
}
function allRenderFavSelects(){
  tabs.forEach(function(t){renderFavSelect(t.id);});
}

// ── TROOP CHIPS ──
function renderTroopChips(id){
  var grid=document.getElementById('tg-'+id);
  if(!grid)return;
  grid.innerHTML='';
  TROOPS.forEach(function(tr){
    var chip=document.createElement('label');
    chip.className='troop-chip';
    chip.innerHTML='<input type="checkbox" value="'+tr.id+'" onchange="onTroopChange(\''+id+'\')"> <span class="troop-name">'+tr.name+'</span><span class="troop-spd">'+tr.spd+'/h</span>';
    grid.appendChild(chip);
  });
}
function onTroopChange(id){
  var selected=getSelectedTroops(id);
  var hint=document.getElementById('th-'+id);
  if(selected.length===0){hint.innerHTML='Seleciona pelo menos uma tropa';}
  else{
    var slowest=getSlowest(selected);
    hint.innerHTML='Velocidade usada: <span>'+slowest.name+' ('+slowest.spd+'/h)</span>';
  }
  // update chips selected state
  document.querySelectorAll('#tg-'+id+' .troop-chip').forEach(function(chip){
    var cb=chip.querySelector('input');
    chip.className=cb.checked?'troop-chip selected':'troop-chip';
  });
  resetResult(id);
}
function getSelectedTroops(id){
  var cbs=document.querySelectorAll('#tg-'+id+' input[type=checkbox]:checked');
  var res=[];
  cbs.forEach(function(cb){var t=TROOPS.find(function(x){return x.id===cb.value;});if(t)res.push(t);});
  return res;
}
function getSlowest(troops){
  return troops.reduce(function(a,b){return a.spd<b.spd?a:b;});
}

function resetResult(id){
  document.getElementById('rp-'+id).className='rp';
  document.getElementById('al-'+id).className='alert';
  var t=tabs.find(function(x){return x.id===id;});
  if(t&&t.cdInt){clearInterval(t.cdInt);t.cdInt=null;}
}

// ── NOW ──
function setNow(id){
  var n=new Date();n.setSeconds(n.getSeconds()+5);
  document.getElementById('ah-'+id).value=n.getHours();
  document.getElementById('am-'+id).value=n.getMinutes();
  document.getElementById('as-'+id).value=n.getSeconds();
}

// ── CALCULATE ──
function calculate(id){
  var al=document.getElementById('al-'+id);
  var villages=getVillages(),idx=parseInt(document.getElementById('vs-'+id).value);
  if(isNaN(idx)||!villages[idx]){al.textContent='⚠ Seleciona uma vila de origem.';al.className='alert show';document.getElementById('rp-'+id).className='rp';return;}
  var sel=getSelectedTroops(id);
  if(sel.length===0){al.textContent='⚠ Seleciona pelo menos uma tropa.';al.className='alert show';document.getElementById('rp-'+id).className='rp';return;}
  var tx=parseFloat(document.getElementById('tx-'+id).value),ty=parseFloat(document.getElementById('ty-'+id).value);
  if(isNaN(tx)||isNaN(ty)){al.textContent='⚠ Preenche as coordenadas do alvo.';al.className='alert show';document.getElementById('rp-'+id).className='rp';return;}
  var ah=parseInt(document.getElementById('ah-'+id).value)||0;
  var am=parseInt(document.getElementById('am-'+id).value)||0;
  var as_=parseInt(document.getElementById('as-'+id).value)||0;

  var vl=villages[idx],slowest=getSlowest(sel);
  var dist=Math.sqrt(Math.pow(tx-vl.x,2)+Math.pow(ty-vl.y,2));
  var trav=dist*secsPerTile(slowest.spd);

  var now=new Date(),arr=new Date(now);
  arr.setHours(ah,am,as_,0);
  if(arr<=now)arr.setDate(arr.getDate()+1);
  var send=new Date(arr.getTime()-trav*1000),nextDay=send.getDate()!==now.getDate();

  al.className=send<now?'alert show':'alert';
  if(send<now)al.textContent='⚠ Hora de envio j\u00e1 passou. A calcular para amanh\u00e3...';

  document.getElementById('st-'+id).textContent=fmtTime(send);
  document.getElementById('sd-'+id).textContent=nextDay?' (amanh\u00e3)':'';
  document.getElementById('rd-'+id).textContent=dist.toFixed(3)+' u';
  document.getElementById('rt-'+id).textContent=fmtDur(trav);
  document.getElementById('ro-'+id).textContent=vl.name;
  document.getElementById('rtr-'+id).textContent=slowest.name+' ('+slowest.spd+'/h)';
  document.getElementById('rp-'+id).className='rp show';

  var t=tabs.find(function(x){return x.id===id;});
  if(t&&t.cdInt)clearInterval(t.cdInt);
  var sendTs=send;
  function tick(){
    var diff=(sendTs-new Date())/1000,el=document.getElementById('cd-'+id);
    if(!el)return;
    if(diff<=0){el.textContent='ENVIA AGORA';el.className='cdval now';return;}
    var h=Math.floor(diff/3600),m=Math.floor((diff%3600)/60),s=Math.floor(diff%60);
    el.textContent=(h>0?pad(h)+':':'')+pad(m)+':'+pad(s);
    el.className=diff<60?'cdval urgent':'cdval';
  }
  tick();
  if(t)t.cdInt=setInterval(tick,1000);
}

// ── VILLAGE MODAL ──
var vmMode='add',vmTabId=null;
function openVModal(mode,tabId){
  vmMode=mode;vmTabId=tabId;
  document.getElementById('vm-err').className='merr';
  if(mode==='edit'){
    var idx=parseInt(document.getElementById('vs-'+tabId).value),v=getVillages()[idx];
    if(!v)return;
    document.getElementById('vm-title').textContent='Editar Vila';
    document.getElementById('vm-name').value=v.name;
    document.getElementById('vm-x').value=v.x;
    document.getElementById('vm-y').value=v.y;
  }else{
    document.getElementById('vm-title').textContent='Nova Vila';
    document.getElementById('vm-name').value='';
    document.getElementById('vm-x').value='';
    document.getElementById('vm-y').value='';
  }
  document.getElementById('vmodal').classList.add('show');
  setTimeout(function(){document.getElementById('vm-name').focus();},50);
}
function closeVModal(){document.getElementById('vmodal').classList.remove('show');}
function saveVillage(){
  var name=document.getElementById('vm-name').value.trim(),x=document.getElementById('vm-x').value,y=document.getElementById('vm-y').value;
  if(!name||x===''||y===''){document.getElementById('vm-err').className='merr show';return;}
  var v=getVillages(),entry={name:name,x:parseFloat(x),y:parseFloat(y)},ti;
  if(vmMode==='edit'){ti=parseInt(document.getElementById('vs-'+vmTabId).value);v[ti]=entry;}
  else{v.push(entry);ti=v.length-1;}
  setVillages(v);closeVModal();
  tabs.forEach(function(t){renderVillageSelect(t.id,vmTabId===t.id?ti:undefined);});
}
function deleteVillage(tabId){
  var idx=parseInt(document.getElementById('vs-'+tabId).value),v=getVillages();
  if(isNaN(idx)||!v[idx])return;
  if(!confirm('Apagar "'+v[idx].name+'"?'))return;
  v.splice(idx,1);setVillages(v);
  tabs.forEach(function(t){renderVillageSelect(t.id);});
}
document.getElementById('vmodal').addEventListener('keydown',function(e){if(e.key==='Enter')saveVillage();if(e.key==='Escape')closeVModal();});

// ── FAV MODAL ──
var fmTabId=null;
function openFModal(tabId){
  fmTabId=tabId;
  document.getElementById('fm-err').className='merr';
  var tx=document.getElementById('tx-'+tabId).value,ty=document.getElementById('ty-'+tabId).value;
  document.getElementById('fm-name').value='';
  document.getElementById('fm-x').value=tx||'';
  document.getElementById('fm-y').value=ty||'';
  document.getElementById('fmodal').classList.add('show');
  setTimeout(function(){document.getElementById('fm-name').focus();},50);
}
function closeFModal(){document.getElementById('fmodal').classList.remove('show');}
function saveFav(){
  var name=document.getElementById('fm-name').value.trim(),x=document.getElementById('fm-x').value,y=document.getElementById('fm-y').value;
  if(!name||x===''||y===''){document.getElementById('fm-err').className='merr show';return;}
  var f=getFavs();f.push({name:name,x:parseFloat(x),y:parseFloat(y)});
  setFavs(f);closeFModal();allRenderFavSelects();
}
document.getElementById('fmodal').addEventListener('keydown',function(e){if(e.key==='Enter')saveFav();if(e.key==='Escape')closeFModal();});

addTab();
